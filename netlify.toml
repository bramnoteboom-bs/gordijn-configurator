# Netlify build configuration — Gordijnconfigurator
#
# Repo layout assumption: index.html, _headers and _redirects all in the
# repo root. Nothing to build, just serve as-is.

[build]
  publish = "."
  command = ""

# Explicit header rule (mirrors _headers — Netlify honors both; this is
# here so the CSP is visible in the config without hunting for _headers)
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://alcdn.msauth.net https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://login.microsoftonline.com https://graph.microsoft.com https://alcdn.msauth.net https://*.powerplatform.com https://*.azure.com https://*.logic.azure.com"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA fallback — any unknown path serves index.html with 200 (not 301)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
